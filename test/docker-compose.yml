services:
  dokuwiki:
    image: linuxserver/dokuwiki:latest
    container_name: dokuwiki-bpmnio-test
    environment:
      - PUID=1000
      - PGID=1000
      - TZ=Europe/Amsterdam
    volumes:
      - ../:/config/dokuwiki/lib/plugins/bpmnio:ro
      - ./data:/config/dokuwiki/data/pages/test:rw
    ports:
      - "8080:80"
    healthcheck:
      test: ["CMD-SHELL", "wget -q --spider http://localhost/ || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
